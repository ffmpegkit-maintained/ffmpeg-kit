name: Port 7.1 - Basic (diagnostic, manual only)

# Same purpose as port-71-free.yml, for the Basic tier's library set (see
# build-basic.yml in android-6.0-lts for the original --disable-lib-*
# flags this mirrors). Launched in parallel with port-71-full.yml and
# port-71-gpl.yml once the Free tier's two fixes (emms.h path,
# missing string.h includes) confirmed they were generic, not
# library-specific. Delete once the port is done.

on:
  workflow_dispatch:

jobs:
  build:
    name: Port test - 7.1 basic (arm64-v8a)
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    defaults:
      run:
        shell: bash
        working-directory: android-7.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config curl git \
            build-essential yasm nasm gperf texinfo bison ragel \
            python3 python3-pip unzip zip wget meson ninja-build \
            doxygen cmake autogen autopoint groff gtk-doc-tools libtasn1-bin

      - name: Install Android platform 35
        run: |
          set +o pipefail
          yes | "${ANDROID_HOME}"/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null
          set -o pipefail
          "${ANDROID_HOME}"/cmdline-tools/latest/bin/sdkmanager "platforms;android-35"

      - name: Cache Android NDK r26c
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/.ndk
          key: ndk-r26c-linux

      - name: Download Android NDK r26c
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -s "https://dl.google.com/android/repository/android-ndk-r26c-linux.zip" -o ndk.zip
          unzip -q -o ndk.zip -d "${HOME}/.ndk"

      - name: Export ANDROID_NDK_ROOT
        run: echo "ANDROID_NDK_ROOT=${HOME}/.ndk/$(ls "${HOME}/.ndk")" >> "$GITHUB_ENV"

      # Distinct branch name (port71-basic) from the production "basic"
      # branch already in ci-cache-private (android-6.0-lts's
      # build-basic.yml) - must never collide. Same private-repo rationale
      # as the production workflows: this is a paid-tier library set, never
      # a public branch/artifact.
      - name: Restore latest checkpoint from private cache repo
        env:
          CI_CACHE_TOKEN: ${{ secrets.CI_CACHE_TOKEN }}
        run: |
          REMOTE="https://x-access-token:${CI_CACHE_TOKEN}@github.com/ffmpegkit-maintained/ci-cache-private.git"
          if git ls-remote --exit-code --heads "$REMOTE" port71-basic >/dev/null 2>&1; then
            echo "Found port71-basic branch in ci-cache-private, restoring prebuilt/ and src/ from it"
            git fetch --depth=1 "$REMOTE" port71-basic
            git archive FETCH_HEAD | tar -x
          else
            echo "No port71-basic branch yet in ci-cache-private - starting fresh"
          fi

      - name: Attempt basic variant build (arm64-v8a only)
        env:
          CI_CACHE_TOKEN: ${{ secrets.CI_CACHE_TOKEN }}
        run: |
          checkpoint() {
            flock /tmp/checkpoint.lock -c '
              tmp=$(mktemp -d)
              cp -r prebuilt "$tmp/" 2>/dev/null
              cp -r src "$tmp/" 2>/dev/null
              ( cd "$tmp" \
                && git init -q -b port71-basic \
                && git add -A \
                && git -c user.email="ci-checkpoint@ffmpegkit-maintained" -c user.name="ci-checkpoint" commit -q -m "checkpoint $(date -u +%FT%TZ)" \
                && git push -q -f "https://x-access-token:${CI_CACHE_TOKEN}@github.com/ffmpegkit-maintained/ci-cache-private.git" HEAD:port71-basic )
              rm -rf "$tmp"
            '
          }
          (
            while true; do
              sleep 120
              checkpoint || true
            done
          ) &
          CHECKPOINT_PID=$!

          touch build.log
          set +e
          ./android.sh --full --enable-android-media-codec --enable-android-zlib \
            --disable-lib-gnutls \
            --disable-lib-kvazaar \
            --disable-lib-tesseract --disable-lib-leptonica \
            --disable-lib-libass --disable-lib-harfbuzz --disable-lib-freetype --disable-lib-fontconfig --disable-lib-fribidi \
            --disable-lib-srt --disable-lib-chromaprint \
            --disable-arm-v7a --disable-arm-v7a-neon --disable-x86 --disable-x86-64
          BUILD_EXIT=$?
          kill "$CHECKPOINT_PID" 2>/dev/null || true
          wait "$CHECKPOINT_PID" 2>/dev/null || true
          checkpoint || true
          echo "BUILD_EXIT=$BUILD_EXIT" >> "$GITHUB_ENV"

      - name: Print full build log
        if: always()
        run: cat build.log || echo "no build.log produced"

      - name: Print ffbuild config log
        if: always()
        run: '[[ -f ./src/ffmpeg/ffbuild/config.log ]] && tail -200 ./src/ffmpeg/ffbuild/config.log || echo "no ffbuild config.log"'

      - name: Fail the job if the build actually failed
        if: always()
        run: '[[ "${BUILD_EXIT}" == "0" ]] || exit 1'
