name: Build 8.1 LTS (Free variant)
run-name: "Build 8.1 LTS — Free${{ startsWith(github.ref, 'refs/tags/') && format(' — {0}', github.ref_name) || '' }}"

# FFmpeg 8.1 LTS line - coexists with the original 6.0-lts Free tier
# (build-free.yml), distinct Maven artifact (dev.ffmpegkit-maintained:
# ffmpeg-kit-free-81, not ffmpeg-kit-free), distinct tag suffix (-free81,
# not -free) so neither line's tags ever trigger the other's workflow.
#
# Same library set/rationale as the 6.0 Free tier: software-only (no
# Android MediaCodec, for consistent behavior across devices regardless
# of manufacturer hardware codec quirks), with real modern video
# encode+decode (VP8/VP9 via libvpx, AV1 via libaom+dav1d) and core audio
# codecs (Opus, Vorbis, Speex). Still LGPL-3.0. See docs/PATCH-NOTES.md
# for the FFmpeg 6.0 -> 8.1.2 port findings (two small fixes needed, no
# JNI rewrite, runtime-verified on a real Pixel 7 Pro).

on:
  push:
    tags: ["v*-free81"]
  workflow_dispatch:

jobs:
  build:
    name: Build ffmpeg-kit 8.1 LTS (free, arm64-v8a)
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    permissions:
      contents: write

    defaults:
      run:
        shell: bash
        working-directory: android-8.1-lts

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config curl git \
            build-essential yasm nasm gperf texinfo bison ragel \
            python3 python3-pip unzip zip wget meson ninja-build \
            doxygen cmake autogen autopoint groff gtk-doc-tools libtasn1-bin

      - name: Install Android platform 35
        run: |
          set +o pipefail
          yes | "${ANDROID_HOME}"/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null
          set -o pipefail
          "${ANDROID_HOME}"/cmdline-tools/latest/bin/sdkmanager "platforms;android-35"

      - name: Cache Android NDK r26c
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/.ndk
          key: ndk-r26c-linux

      - name: Download Android NDK r26c
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -s "https://dl.google.com/android/repository/android-ndk-r26c-linux.zip" -o ndk.zip
          unzip -q -o ndk.zip -d "${HOME}/.ndk"

      - name: Export ANDROID_NDK_ROOT
        run: echo "ANDROID_NDK_ROOT=${HOME}/.ndk/$(ls "${HOME}/.ndk")" >> "$GITHUB_ENV"

      # Distinct cache key/branch from the other three 8.1 tiers, and from
      # all four 6.0-lts and 7.1-lts tiers - never share a cache namespace
      # across lines or tiers.
      - name: Restore actions/cache (covers any run that finished naturally)
        uses: actions/cache/restore@v4
        with:
          path: |
            android-8.1-lts/prebuilt
            android-8.1-lts/src
          key: ffmpeg-kit-build-81-free-${{ hashFiles('android-8.1-lts/android.sh', 'android-8.1-lts/scripts/**') }}

      # Pushed to ci-cache-private (81-free branch) for consistency with
      # the other 8.1 tiers - avoids dangling branches on the public repo.
      - name: Restore latest build checkpoint from private cache repo
        env:
          CI_CACHE_TOKEN: ${{ secrets.CI_CACHE_TOKEN }}
        run: |
          REMOTE="https://x-access-token:${CI_CACHE_TOKEN}@github.com/ffmpegkit-maintained/ci-cache-private.git"
          if git ls-remote --exit-code --heads "$REMOTE" 81-free >/dev/null 2>&1; then
            echo "Found 81-free branch in ci-cache-private, restoring prebuilt/ and src/ from it"
            git fetch --depth=1 "$REMOTE" 81-free
            git archive FETCH_HEAD | tar -x
            echo "Restored:"
            find prebuilt src -maxdepth 2 -type d 2>/dev/null | sort || true
          else
            echo "No 81-free branch yet in ci-cache-private - starting fresh"
          fi

      - name: Build free variant (arm64-v8a only)
        env:
          CI_CACHE_TOKEN: ${{ secrets.CI_CACHE_TOKEN }}
        run: |
          checkpoint() {
            flock /tmp/checkpoint.lock -c '
              tmp=$(mktemp -d)
              cp -r prebuilt "$tmp/" 2>/dev/null
              cp -r src "$tmp/" 2>/dev/null
              ( cd "$tmp" \
                && git init -q -b 81-free \
                && git add -A \
                && git -c user.email="ci-checkpoint@ffmpegkit-maintained" -c user.name="ci-checkpoint" commit -q -m "checkpoint $(date -u +%FT%TZ)" \
                && git push -q -f "https://x-access-token:${CI_CACHE_TOKEN}@github.com/ffmpegkit-maintained/ci-cache-private.git" HEAD:81-free )
              rm -rf "$tmp"
            '
          }
          (
            while true; do
              sleep 120
              checkpoint || true
            done
          ) &
          CHECKPOINT_PID=$!

          touch build.log
          set +e
          ./android.sh \
            --enable-libaom --enable-dav1d --enable-libvpx \
            --enable-opus --enable-libvorbis --enable-speex \
            --disable-arm-v7a --disable-arm-v7a-neon --disable-x86 --disable-x86-64
          BUILD_EXIT=$?
          kill "$CHECKPOINT_PID" 2>/dev/null || true
          wait "$CHECKPOINT_PID" 2>/dev/null || true
          checkpoint || true
          exit "$BUILD_EXIT"

      - name: Print build log on failure
        if: failure()
        run: cat build.log || echo "no build.log produced (failed before the build step ran)"

      - name: Print ffbuild config log on failure
        if: failure()
        run: '[[ -f ./src/ffmpeg/ffbuild/config.log ]] && tail -100 ./src/ffmpeg/ffbuild/config.log || true'

      - name: Print toolchain env and per-library config logs on failure
        if: failure()
        run: |
          echo "=== toolchain env ==="
          echo "CC=$CC"
          echo "CXX=$CXX"
          echo "AR=$AR"
          echo "AS=$AS"
          echo "LD=$LD"
          echo "STRIP=$STRIP"
          echo "RANLIB=$RANLIB"
          echo "CFLAGS=$CFLAGS"
          echo "CXXFLAGS=$CXXFLAGS"
          echo "LDFLAGS=$LDFLAGS"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          echo
          echo "=== config.log files under src/ (most recently modified first) ==="
          while IFS= read -r log; do
            echo "--- $log ---"
            tail -150 "$log"
            echo
          done < <(find src -iname "config.log" -printf '%T@ %p\n' 2>/dev/null | sort -rn | cut -d' ' -f2- | head -3)

      - name: Verify 16 KB page size alignment
        run: |
          set -e
          fail=0
          while IFS= read -r so; do
            min_exp=99
            while IFS= read -r exp; do
              [[ -z "$exp" ]] && continue
              (( exp < min_exp )) && min_exp=$exp
            done < <(objdump -p "$so" | grep -A1 LOAD | grep -oE 'align 2\*\*[0-9]+' | grep -oE '[0-9]+$')
            echo "$so: align=2**${min_exp}"
            if (( min_exp < 14 )); then
              echo "::error file=${so}::not 16 KB aligned (got 2**${min_exp})"
              fail=1
            fi
          done < <(find prebuilt -name "*.so")
          exit "$fail"

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-81-free-arm64-v8a
          path: android-8.1-lts/prebuilt/bundle-android-aar/ffmpeg-kit/ffmpeg-kit.aar

      # Attach the AAR to the corresponding vX.Y.Z-lts-android GitHub release.
      # Tag format: v8.1.2-free81 → strip prefix/suffix → 8.1.2 → v8.1.2-lts-android.
      - name: Upload AAR to GitHub release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION%-free81}"
          RELEASE_TAG="v${VERSION}-lts-android"
          DEST="ffmpeg-kit-free81-${VERSION}-arm64-v8a.aar"
          cp prebuilt/bundle-android-aar/ffmpeg-kit/ffmpeg-kit.aar "$DEST"
          gh release upload "$RELEASE_TAG" "$DEST" --clobber --repo "$GITHUB_REPOSITORY"

      # Maven Central publishes are effectively permanent (you can't delete
      # a released version, only release a new one) - only do this on an
      # actual "v*-free81" tag push, never on a manual workflow_dispatch
      # test run. Skip silently if the version is already published (safe
      # to re-push the tag without duplicating the release).
      - name: Publish to Maven Central (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: android-8.1-lts/android
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: "15567C31"
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION%-free81}"
          GROUP="dev.ffmpegkit-maintained"
          ARTIFACT="ffmpeg-kit-free-81"
          POM_URL="https://repo1.maven.org/maven2/${GROUP//.//}/${ARTIFACT}/${VERSION}/${ARTIFACT}-${VERSION}.pom"
          if curl -sf "$POM_URL" > /dev/null 2>&1; then
            echo "Version ${VERSION} already on Maven Central — skipping publish."
          else
            ./gradlew :ffmpeg-kit-android-lib:publishAndReleaseToMavenCentral --no-configuration-cache
          fi
