name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    # Only the "full" variant is wired up — android.sh has no audio/video/https
    # presets (those are upstream's historical Maven Central artifact names, not
    # build flags). Only arm64-v8a is built/published; see README § Compatibility.
    #
    # Triggered on version tags only (not every push/PR): this is a from-source
    # FFmpeg build, easily 30-90+ minutes of compute — reserve it for actual
    # releases. Use workflow_dispatch for an on-demand test run.
    name: Build ffmpeg-kit (full, arm64-v8a)
    runs-on: ubuntu-24.04
    # A previous attempt hung silently for ~6h until GitHub's own hard cap
    # killed it (conclusion: cancelled, no error). Bound that here so a
    # repeat hang fails fast instead of burning a full day of turnaround.
    timeout-minutes: 180
    # Needed to push incremental checkpoints to the ci-cache branch (see
    # below) - actions/cache alone isn't enough, its save step is skipped
    # entirely on a cancelled/timed-out job, which is exactly the failure
    # mode we keep hitting.
    permissions:
      contents: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config curl git \
            build-essential yasm nasm gperf texinfo bison ragel \
            python3 python3-pip unzip zip wget meson ninja-build \
            doxygen cmake autogen autopoint groff gtk-doc-tools libtasn1-bin

      - name: Install Android platform 35
        run: |
          set +o pipefail
          yes | "${ANDROID_HOME}"/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null
          set -o pipefail
          "${ANDROID_HOME}"/cmdline-tools/latest/bin/sdkmanager "platforms;android-35"

      - name: Cache Android NDK r26c
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/.ndk
          key: ndk-r26c-linux

      - name: Download Android NDK r26c
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -s "https://dl.google.com/android/repository/android-ndk-r26c-linux.zip" -o ndk.zip
          unzip -q -o ndk.zip -d "${HOME}/.ndk"

      - name: Export ANDROID_NDK_ROOT
        run: echo "ANDROID_NDK_ROOT=${HOME}/.ndk/$(ls "${HOME}/.ndk")" >> "$GITHUB_ENV"

      # actions/cache's restore-on-start/save-at-end model isn't enough on its
      # own: the save (post-step) is skipped entirely when the job is
      # cancelled or hits its timeout - which is exactly what happened twice
      # (one manual cancel, one 6h hard-timeout kill) - so it never actually
      # saved anything across those attempts. Still worth restoring from
      # though: it does work for any run that previously finished naturally
      # (e.g. the test-harfbuzz.yml diagnostic, which shares this exact key).
      - name: Restore actions/cache (covers any run that finished naturally)
        uses: actions/cache/restore@v4
        with:
          path: |
            prebuilt
            src
          key: ffmpeg-kit-build-${{ hashFiles('android.sh', 'scripts/**') }}

      # Belt-and-suspenders on top of the cache above: a git branch as a
      # second checkpoint store, since a `git push` that already succeeded
      # is durable even if THIS job later gets cancelled/timed out (unlike
      # actions/cache's save step). Restores after the actions/cache step so
      # it can overlay anything more recent that a partial/killed run pushed
      # but never got to save through actions/cache's own post-step.
      - name: Restore latest build checkpoint from ci-cache branch
        run: |
          if git ls-remote --exit-code --heads origin ci-cache >/dev/null 2>&1; then
            echo "Found ci-cache branch, restoring prebuilt/ and src/ from it"
            git fetch --depth=1 origin ci-cache
            git archive FETCH_HEAD | tar -x
            echo "Restored:"
            find prebuilt src -maxdepth 2 -type d 2>/dev/null | sort
          else
            echo "No ci-cache branch yet - starting fresh"
          fi

      # --full enables both gnutls and openssl, which FFmpeg's own configure
      # refuses outright ("GnuTLS and OpenSSL must not be enabled at the same
      # time."). Keep OpenSSL (Apache-2.0, no GPL-adjacent licensing
      # questions) and drop GnuTLS.
      #
      # Pushes a checkpoint of prebuilt/ + src/ to the ci-cache branch every
      # 2 minutes in the background, so a hang/timeout-kill only loses the
      # last <2 minutes of progress instead of the entire run. Known caveat:
      # this can occasionally snapshot a library mid-install (cp racing with
      # make), which android.sh's own already-built check wouldn't catch -
      # acceptable risk for a resilience mechanism, not a correctness
      # guarantee; the 16 KB alignment check and AAR assembly step below
      # still have to pass either way.
      - name: Build full variant (arm64-v8a only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          checkpoint() {
            local tmp
            tmp=$(mktemp -d)
            cp -r prebuilt "$tmp/" 2>/dev/null
            cp -r src "$tmp/" 2>/dev/null
            ( cd "$tmp" \
              && git init -q -b ci-cache \
              && git add -A \
              && git -c user.email="ci-checkpoint@ffmpegkit-maintained" -c user.name="ci-checkpoint" commit -q -m "checkpoint $(date -u +%FT%TZ)" \
              && git push -q -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:ci-cache )
            rm -rf "$tmp"
          }
          (
            while true; do
              sleep 120
              checkpoint || true
            done
          ) &
          CHECKPOINT_PID=$!

          touch build.log
          tail -f build.log &
          TAIL_PID=$!
          set +e
          ./android.sh --full --enable-android-media-codec --enable-android-zlib --disable-lib-gnutls --disable-arm-v7a --disable-arm-v7a-neon --disable-x86 --disable-x86-64
          BUILD_EXIT=$?
          kill "$TAIL_PID" "$CHECKPOINT_PID" 2>/dev/null || true
          wait "$TAIL_PID" "$CHECKPOINT_PID" 2>/dev/null || true
          checkpoint || true
          exit "$BUILD_EXIT"

      - name: Print build log
        if: always()
        run: cat build.log || echo "no build.log produced (failed before the build step ran)"

      - name: Print ffbuild config log on failure
        if: failure()
        run: '[[ -f ./src/ffmpeg/ffbuild/config.log ]] && tail -100 ./src/ffmpeg/ffbuild/config.log || true'

      - name: Print toolchain env and per-library config logs on failure
        if: failure()
        run: |
          echo "=== toolchain env ==="
          echo "CC=$CC"
          echo "CXX=$CXX"
          echo "AR=$AR"
          echo "AS=$AS"
          echo "LD=$LD"
          echo "STRIP=$STRIP"
          echo "RANLIB=$RANLIB"
          echo "CFLAGS=$CFLAGS"
          echo "CXXFLAGS=$CXXFLAGS"
          echo "LDFLAGS=$LDFLAGS"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          echo
          echo "=== config.log files under src/ (most recently modified first) ==="
          while IFS= read -r log; do
            echo "--- $log ---"
            tail -150 "$log"
            echo
          done < <(find src -iname "config.log" -printf '%T@ %p\n' 2>/dev/null | sort -rn | cut -d' ' -f2- | head -3)

      - name: Verify 16 KB page size alignment
        run: |
          set -e
          fail=0
          while IFS= read -r so; do
            min_exp=99
            while IFS= read -r exp; do
              [[ -z "$exp" ]] && continue
              (( exp < min_exp )) && min_exp=$exp
            done < <(objdump -p "$so" | grep -A1 LOAD | grep -oE 'align 2\*\*[0-9]+' | grep -oE '[0-9]+$')
            echo "$so: align=2**${min_exp}"
            if (( min_exp < 14 )); then
              echo "::error file=${so}::not 16 KB aligned (got 2**${min_exp})"
              fail=1
            fi
          done < <(find prebuilt -name "*.so")
          exit "$fail"

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-full-arm64-v8a
          path: prebuilt/bundle-android-aar/ffmpeg-kit.aar
