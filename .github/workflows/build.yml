name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android variants
    runs-on: ubuntu-latest

    strategy:
      matrix:
        variant: [full, audio, video, https]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26c

      # Placeholder: native build pipeline is not wired up yet.
      # Once android.sh / Gradle modules land, replace this step with the
      # real build invocation, e.g.:
      #   ./android.sh --enable-${{ matrix.variant }}
      - name: Build (placeholder)
        run: |
          echo "TODO: build ffmpeg-kit-${{ matrix.variant }} variant"
          echo "See docs/BUILD.md for the manual build procedure."

      # Placeholder: enable once the AAR is actually produced above.
      - name: Upload artifact (placeholder)
        if: false
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-${{ matrix.variant }}
          path: prebuilt/**/*.aar
