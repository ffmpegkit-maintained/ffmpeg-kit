name: Port 7.1 - Smoke test (diagnostic, manual only)

# Runs the real 3-part instrumented smoke test (SmokeTest.java) against the
# Free tier - the actual point of building the 7.1.5 port, not just
# confirming it compiles (port-71-free.yml only does that).
#
# First attempt used a normal x86_64 runner (ubuntu-24.04) with an
# arm64-v8a system image, expecting it to be merely slow (unaccelerated
# software emulation). It's worse than that: the modern Android Emulator
# refuses outright - "FATAL: Avd's CPU Architecture 'arm64' is not
# supported by the QEMU2 emulator on x86_64 host. System image must match
# the host architecture." - confirmed directly via a failed CI run, not a
# guess. Cross-architecture ARM emulation on x86 hosts isn't supported by
# current emulator builds at all, accelerated or not.
#
# Switched to a genuine ARM64 GitHub-hosted runner (ubuntu-24.04-arm,
# free for public repos) so host and guest architectures actually match.
# Still no /dev/kvm on these free runners (confirmed separately), so this
# is still unaccelerated QEMU TCG emulation - slow, but no longer
# categorically refused. Also note: ANDROID_HOME is NOT auto-configured
# on this image unlike the x86_64 one (confirmed via
# actions/runner-images#11460) - set explicitly below.
#
# Delete this workflow once the port is done and folded into a real CI
# workflow.

on:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Smoke test - 7.1 free (arm64-v8a emulator on arm64 runner, unaccelerated)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    defaults:
      run:
        shell: bash
        working-directory: android-7.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Neither ANDROID_HOME nor ANDROID_SDK_ROOT is set on this image
      # (confirmed: the first attempt's ANDROID_SDK_ROOT was also empty,
      # contrary to actions/runner-images#11460's suggested workaround).
      # The x86_64 runner image's SDK lives at the conventional
      # /usr/local/lib/android/sdk path (seen directly in the first
      # attempt's adb path before this fix existed) - check whether the
      # ARM64 image uses the same path, since the underlying images are
      # built from the same actions/runner-images source with just the
      # target arch changed.
      - name: Locate the Android SDK and set ANDROID_HOME
        run: |
          if [[ -d /usr/local/lib/android/sdk ]]; then
            echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
            echo "Found SDK at /usr/local/lib/android/sdk"
          else
            echo "::error::Android SDK not found at the expected path. Searching disk:"
            find / -maxdepth 6 -iname "sdkmanager" 2>/dev/null || true
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config curl git \
            build-essential yasm nasm gperf texinfo bison ragel \
            python3 python3-pip unzip zip wget meson ninja-build \
            doxygen cmake autogen autopoint groff gtk-doc-tools libtasn1-bin

      - name: Install Android platform 35
        run: |
          set +o pipefail
          yes | "${ANDROID_HOME}"/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null
          set -o pipefail
          "${ANDROID_HOME}"/cmdline-tools/latest/bin/sdkmanager "platforms;android-35"

      - name: Cache Android NDK r26c
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/.ndk
          key: ndk-r26c-linux

      - name: Download Android NDK r26c
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -s "https://dl.google.com/android/repository/android-ndk-r26c-linux.zip" -o ndk.zip
          unzip -q -o ndk.zip -d "${HOME}/.ndk"

      - name: Export ANDROID_NDK_ROOT
        run: echo "ANDROID_NDK_ROOT=${HOME}/.ndk/$(ls "${HOME}/.ndk")" >> "$GITHUB_ENV"

      - name: Build free variant (arm64-v8a only) - already confirmed green
        run: |
          touch build.log
          set +e
          ./android.sh \
            --enable-libaom --enable-dav1d --enable-libvpx \
            --enable-opus --enable-libvorbis --enable-speex \
            --disable-arm-v7a --disable-arm-v7a-neon --disable-x86 --disable-x86-64
          echo "BUILD_EXIT=$?" >> "$GITHUB_ENV"

      - name: Print build log on failure
        if: failure()
        run: cat build.log || echo "no build.log produced"

      - name: Fail fast if the library build itself failed (no point booting an emulator)
        run: '[[ "${BUILD_EXIT}" == "0" ]] || exit 1'

      # No hardware acceleration available (confirmed: GitHub's free ARM64
      # runners lack /dev/kvm) - expect a slow boot. Host/guest arch now
      # match (arm64 runner + arm64-v8a image), so the FATAL
      # architecture-mismatch abort from the first attempt doesn't apply
      # here. emulator-options below disable everything non-essential to
      # minimize what unaccelerated QEMU has to render/process.
      - name: Run instrumented smoke test on an arm64-v8a emulator (unaccelerated)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: arm64-v8a
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: android-7.1/android
          script: ./gradlew :ffmpeg-kit-android-lib:connectedDebugAndroidTest --info
