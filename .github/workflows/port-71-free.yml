name: Port 7.1 - Free (diagnostic, manual only)

# Temporary diagnostic workflow for the FFmpeg 6.0 -> 7.1.5 JNI wrapper port
# (see project plan / tasks #21-28). Builds only the Free tier (zero
# external libs) to isolate pure JNI/wrapper compile issues from library-
# specific ones, per the agreed port order. Not a release pipeline - that
# comes later (task #28) once this actually compiles. Delete once the port
# is done and a real build-71-*.yml set replaces it.

on:
  workflow_dispatch:

jobs:
  build:
    name: Port test - 7.1 free (arm64-v8a)
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    defaults:
      run:
        shell: bash
        working-directory: android-7.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config curl git \
            build-essential yasm nasm gperf texinfo bison ragel \
            python3 python3-pip unzip zip wget meson ninja-build \
            doxygen cmake autogen autopoint groff gtk-doc-tools libtasn1-bin

      - name: Install Android platform 35
        run: |
          set +o pipefail
          yes | "${ANDROID_HOME}"/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null
          set -o pipefail
          "${ANDROID_HOME}"/cmdline-tools/latest/bin/sdkmanager "platforms;android-35"

      - name: Cache Android NDK r26c
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/.ndk
          key: ndk-r26c-linux

      - name: Download Android NDK r26c
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -s "https://dl.google.com/android/repository/android-ndk-r26c-linux.zip" -o ndk.zip
          unzip -q -o ndk.zip -d "${HOME}/.ndk"

      - name: Export ANDROID_NDK_ROOT
        run: echo "ANDROID_NDK_ROOT=${HOME}/.ndk/$(ls "${HOME}/.ndk")" >> "$GITHUB_ENV"

      # No checkpoint/cache mechanism here on purpose - this is a short-lived
      # diagnostic workflow, not worth the engineering. Expected to fail
      # repeatedly while the JNI wrapper is being ported; each run rebuilds
      # the (cheap, free-tier) library set from scratch.
      - name: Attempt free variant build (arm64-v8a only) - expected to fail until ported
        run: |
          touch build.log
          set +e
          ./android.sh \
            --enable-libaom --enable-dav1d --enable-libvpx \
            --enable-opus --enable-libvorbis --enable-speex \
            --disable-arm-v7a --disable-arm-v7a-neon --disable-x86 --disable-x86-64
          echo "BUILD_EXIT=$?" >> "$GITHUB_ENV"

      - name: Print full build log
        if: always()
        run: cat build.log || echo "no build.log produced"

      - name: Print ffbuild config log
        if: always()
        run: '[[ -f ./src/ffmpeg/ffbuild/config.log ]] && tail -200 ./src/ffmpeg/ffbuild/config.log || echo "no ffbuild config.log"'

      - name: Fail the job if the build actually failed
        if: always()
        run: '[[ "${BUILD_EXIT}" == "0" ]] || exit 1'

      # Free tier only (no licensing/exposure concern, unlike the paid
      # tiers) - lets the local smoke-test app (see CLAUDE.md) pull down a
      # real 7.1.5 AAR to embed instead of needing a Linux build toolchain
      # on the Windows machine running that test.
      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-free-71-arm64-v8a
          path: android-7.1/prebuilt/bundle-android-aar/ffmpeg-kit/ffmpeg-kit.aar
