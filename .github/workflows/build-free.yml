name: Build 6.0 LTS (Free variant)
run-name: "Build 6.0 LTS â€” Free${{ startsWith(github.ref, 'refs/tags/') && format(' â€” {0}', github.ref_name) || '' }}"

# The free Maven Central tier: software-only (no Android MediaCodec, for
# consistent behavior across devices regardless of manufacturer hardware
# codec quirks), with real modern video encode+decode (VP8/VP9 via libvpx,
# AV1 via libaom+dav1d) and core audio codecs (Opus, Vorbis, Speex). No
# --full here - only the libraries below are explicitly enabled, unlike
# the other three tiers which start from --full and subtract. Everything
# else (H.264/H.265 encode, TLS, images, subtitles, OCR, SRT, fingerprinting,
# zimg/snappy/soxr/libxml2/zlib) is left out on purpose - see README
# "Available tiers". Still LGPL-3.0.

on:
  push:
    tags: ["v*-free"]
  workflow_dispatch:

jobs:
  build:
    name: Build ffmpeg-kit (free, arm64-v8a)
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    permissions:
      contents: write

    defaults:
      run:
        shell: bash
        working-directory: android-6.0-lts

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config curl git \
            build-essential yasm nasm gperf texinfo bison ragel \
            python3 python3-pip unzip zip wget meson ninja-build \
            doxygen cmake autogen autopoint groff gtk-doc-tools libtasn1-bin

      - name: Install Android platform 35
        run: |
          set +o pipefail
          yes | "${ANDROID_HOME}"/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null
          set -o pipefail
          "${ANDROID_HOME}"/cmdline-tools/latest/bin/sdkmanager "platforms;android-35"

      - name: Cache Android NDK r26c
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/.ndk
          key: ndk-r26c-linux

      - name: Download Android NDK r26c
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -s "https://dl.google.com/android/repository/android-ndk-r26c-linux.zip" -o ndk.zip
          unzip -q -o ndk.zip -d "${HOME}/.ndk"

      - name: Export ANDROID_NDK_ROOT
        run: echo "ANDROID_NDK_ROOT=${HOME}/.ndk/$(ls "${HOME}/.ndk")" >> "$GITHUB_ENV"

      # Distinct cache key/branch from the other three tiers - a much
      # smaller, explicitly-enabled ENABLED_LIBRARIES set (no --full here).
      - name: Restore actions/cache (covers any run that finished naturally)
        uses: actions/cache/restore@v4
        with:
          path: |
            android-6.0-lts/prebuilt
            android-6.0-lts/src
          key: ffmpeg-kit-build-free-${{ hashFiles('android-6.0-lts/android.sh', 'android-6.0-lts/scripts/**') }}

      - name: Restore latest build checkpoint from ci-cache-free branch
        run: |
          if git ls-remote --exit-code --heads origin ci-cache-free >/dev/null 2>&1; then
            echo "Found ci-cache-free branch, restoring prebuilt/ and src/ from it"
            git fetch --depth=1 origin ci-cache-free
            git archive FETCH_HEAD | tar -x
            echo "Restored:"
            find prebuilt src -maxdepth 2 -type d 2>/dev/null | sort || true
          else
            echo "No ci-cache-free branch yet - starting fresh"
          fi

      - name: Build free variant (arm64-v8a only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          checkpoint() {
            flock /tmp/checkpoint.lock -c '
              tmp=$(mktemp -d)
              cp -r prebuilt "$tmp/" 2>/dev/null
              cp -r src "$tmp/" 2>/dev/null
              ( cd "$tmp" \
                && git init -q -b ci-cache-free \
                && git add -A \
                && git -c user.email="ci-checkpoint@ffmpegkit-maintained" -c user.name="ci-checkpoint" commit -q -m "checkpoint $(date -u +%FT%TZ)" \
                && git push -q -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:ci-cache-free )
              rm -rf "$tmp"
            '
          }
          (
            while true; do
              sleep 120
              checkpoint || true
            done
          ) &
          CHECKPOINT_PID=$!

          touch build.log
          set +e
          ./android.sh \
            --enable-libaom --enable-dav1d --enable-libvpx \
            --enable-opus --enable-libvorbis --enable-speex \
            --disable-arm-v7a --disable-arm-v7a-neon --disable-x86 --disable-x86-64
          BUILD_EXIT=$?
          kill "$CHECKPOINT_PID" 2>/dev/null || true
          wait "$CHECKPOINT_PID" 2>/dev/null || true
          checkpoint || true
          exit "$BUILD_EXIT"

      # Pipeline is stable now (all four tiers verified green) - no need to
      # live-stream build.log into the Actions log on every run anymore;
      # only dump it when something actually breaks.
      - name: Print build log on failure
        if: failure()
        run: cat build.log || echo "no build.log produced (failed before the build step ran)"

      - name: Print ffbuild config log on failure
        if: failure()
        run: '[[ -f ./src/ffmpeg/ffbuild/config.log ]] && tail -100 ./src/ffmpeg/ffbuild/config.log || true'

      - name: Print toolchain env and per-library config logs on failure
        if: failure()
        run: |
          echo "=== toolchain env ==="
          echo "CC=$CC"
          echo "CXX=$CXX"
          echo "AR=$AR"
          echo "AS=$AS"
          echo "LD=$LD"
          echo "STRIP=$STRIP"
          echo "RANLIB=$RANLIB"
          echo "CFLAGS=$CFLAGS"
          echo "CXXFLAGS=$CXXFLAGS"
          echo "LDFLAGS=$LDFLAGS"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          echo
          echo "=== config.log files under src/ (most recently modified first) ==="
          while IFS= read -r log; do
            echo "--- $log ---"
            tail -150 "$log"
            echo
          done < <(find src -iname "config.log" -printf '%T@ %p\n' 2>/dev/null | sort -rn | cut -d' ' -f2- | head -3)

      - name: Verify 16 KB page size alignment
        run: |
          set -e
          fail=0
          while IFS= read -r so; do
            min_exp=99
            while IFS= read -r exp; do
              [[ -z "$exp" ]] && continue
              (( exp < min_exp )) && min_exp=$exp
            done < <(objdump -p "$so" | grep -A1 LOAD | grep -oE 'align 2\*\*[0-9]+' | grep -oE '[0-9]+$')
            echo "$so: align=2**${min_exp}"
            if (( min_exp < 14 )); then
              echo "::error file=${so}::not 16 KB aligned (got 2**${min_exp})"
              fail=1
            fi
          done < <(find prebuilt -name "*.so")
          exit "$fail"

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-free-arm64-v8a
          path: android-6.0-lts/prebuilt/bundle-android-aar/ffmpeg-kit/ffmpeg-kit.aar

      # Attach the AAR to the corresponding vX.Y.Z-lts-android GitHub release.
      # Tag format: v6.0.1-free â†’ strip prefix/suffix â†’ 6.0.1 â†’ v6.0.1-lts-android.
      - name: Upload AAR to GitHub release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION%-free}"
          RELEASE_TAG="v${VERSION}-lts-android"
          DEST="ffmpeg-kit-free-${VERSION}-arm64-v8a.aar"
          cp android-6.0-lts/prebuilt/bundle-android-aar/ffmpeg-kit/ffmpeg-kit.aar "$DEST"
          gh release upload "$RELEASE_TAG" "$DEST" --clobber --repo "$GITHUB_REPOSITORY"

      # Maven Central publishes are effectively permanent (you can't delete
      # a released version, only release a new one) - only do this on an
      # actual "v*-free" tag push, never on a manual workflow_dispatch test
      # run. android.sh already ran assembleRelease with the native libs in
      # place, so this reuses that same build instead of recompiling.
      - name: Publish to Maven Central (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: android-6.0-lts/android
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: "15567C31"
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION%-free}"
          GROUP="dev.ffmpegkit-maintained"
          ARTIFACT="ffmpeg-kit-free"
          POM_URL="https://repo1.maven.org/maven2/${GROUP//.//}/${ARTIFACT}/${VERSION}/${ARTIFACT}-${VERSION}.pom"
          if curl -sf "$POM_URL" > /dev/null 2>&1; then
            echo "Version ${VERSION} already on Maven Central â€” skipping publish."
          else
            ./gradlew :ffmpeg-kit-android-lib:publishAndReleaseToMavenCentral --no-configuration-cache
          fi
