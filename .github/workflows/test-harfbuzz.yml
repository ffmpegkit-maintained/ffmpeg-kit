name: Test harfbuzz build (diagnostic, manual only)

# Temporary diagnostic workflow: isolates libass's dependency chain
# (freetype, fribidi, fontconfig, harfbuzz) to test whether harfbuzz hangs
# without waiting on the other ~25 unrelated libraries the --full build
# enables. Uses the same cache key as build.yml, so a natural (non-cancelled)
# finish here also primes the cache for the next full build. Delete this
# file once the harfbuzz hang is diagnosed/fixed.

on:
  workflow_dispatch:

jobs:
  build:
    name: Build libass + deps only (arm64-v8a)
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config curl git \
            build-essential yasm nasm gperf texinfo bison ragel \
            python3 python3-pip unzip zip wget meson ninja-build \
            doxygen cmake autogen autopoint groff gtk-doc-tools libtasn1-bin

      - name: Cache Android NDK r26c
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/.ndk
          key: ndk-r26c-linux

      - name: Download Android NDK r26c
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -s "https://dl.google.com/android/repository/android-ndk-r26c-linux.zip" -o ndk.zip
          unzip -q -o ndk.zip -d "${HOME}/.ndk"

      - name: Export ANDROID_NDK_ROOT
        run: echo "ANDROID_NDK_ROOT=${HOME}/.ndk/$(ls "${HOME}/.ndk")" >> "$GITHUB_ENV"

      # Same key as build.yml's cache step, computed from the CLEAN checkout
      # (this step runs before the verbose-tracing patch below) - if this
      # job finishes naturally, build.yml's next run can restore from it.
      - name: Cache ffmpeg-kit native build (prebuilt + downloaded sources)
        uses: actions/cache@v4
        with:
          path: |
            prebuilt
            src
          key: ffmpeg-kit-build-${{ hashFiles('android.sh', 'scripts/**') }}

      # Diagnostic-only: force verbose, single-threaded output for harfbuzz
      # so the live log shows exactly which compile command is running at
      # any moment. Doesn't change the resulting binary (same flags, just
      # -j1 instead of -jN and V=1 for full command echo), so it's still
      # safe to cache/reuse under the same key as a normal build. Not
      # applied to the real build.yml (speed matters there).
      - name: Patch harfbuzz.sh for verbose single-threaded tracing
        run: |
          sed -i 's#make -j\$(get_cpu_count) || return 1#make V=1 -j1 || return 1#' scripts/android/harfbuzz.sh
          cat scripts/android/harfbuzz.sh

      # --disable-lib-gnutls included deliberately: that flag is what
      # actually triggers the infinite dependency-resolution loop bug
      # (set_library "gnutls" 0 cascades set_virtual_library "libiconv" 0,
      # wiping the enablement libass's own cascade had set, so libiconv
      # never finishes and anything depending on it - including libass
      # itself - loops forever printing "Skipping X" without ever timing
      # out on its own). A healthy run finishes in ~10 min; 15 min timeout
      # here so a still-broken fix fails fast instead of riding out the
      # full 60-minute job timeout.
      - name: Build libass only (pulls freetype, fribidi, fontconfig, harfbuzz)
        timeout-minutes: 15
        run: |
          touch build.log
          stdbuf -oL -eL tail -f build.log &
          TAIL_PID=$!
          set +e
          stdbuf -oL -eL ./android.sh --enable-libass --disable-lib-gnutls --disable-arm-v7a --disable-arm-v7a-neon --disable-x86 --disable-x86-64
          BUILD_EXIT=$?
          sleep 2
          kill "$TAIL_PID" 2>/dev/null || true
          wait "$TAIL_PID" 2>/dev/null || true
          exit "$BUILD_EXIT"

      - name: Print full build log
        if: always()
        run: cat build.log || echo "no build.log produced"
