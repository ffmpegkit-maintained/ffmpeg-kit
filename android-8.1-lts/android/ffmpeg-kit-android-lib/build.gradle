// and recopies this file from tools/android/build.gradle (or
// tools/android/build.lts.gradle with -l/--lts) at the very start of every
// run (see android.sh lines ~38-46) - any edit made only here gets silently
// wiped the next time any CI workflow runs ./android.sh. This bit us once:
// a compileSdk 35 bump and the Maven Central publishing setup were both
// only applied here and got wiped on every real CI build, while local
// `./gradlew assembleRelease` runs (which don't go through android.sh)
// kept using this file directly and made the change look like it worked.
// Edit the templates instead; this file is kept in sync only so local
// Gradle commands run against the same content CI actually builds with.
apply plugin: 'com.android.library'
apply plugin: 'com.vanniktech.maven.publish'

android {
    if (project.android.hasProperty("namespace")) {
        namespace 'com.arthenica.ffmpegkit'
    }
    compileSdk 35
    ndkVersion "27.2.12479018"

    defaultConfig {
        minSdk 24
        targetSdk 35
        versionCode 240810
        versionName "8.1"
        project.archivesBaseName = "ffmpeg-kit"
        consumerProguardFiles "consumer-rules.pro"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ["../libs"]
        }
    }

    testOptions {
        unitTests.returnDefaultValues = true
        unitTests.all {
            systemProperty 'enable.ffmpeg.kit.test.mode', 'true'
        }
    }
}

// com.vanniktech.maven.publish auto-configures android.publishing.singleVariant
// ("release", withJavadocJar+withSourcesJar) itself for Android library
// projects - a manual android.publishing.singleVariant block here conflicts
// with that ("... DSL multiple times ... is not allowed"), so don't add one
// back; assembleRelease/bundleReleaseAar still work the same way through
// the plugin's own auto-configuration.
//
// Only the Free tier (built by .github/workflows/build-free.yml) actually
// invokes ./gradlew publishAndReleaseToMavenCentral - the other three tiers
// (Basic/Full/Full GPL) share this same module but are distributed as
// files on Gumroad, not via this task, so this block being present is
// harmless for them.
mavenPublishing {
    coordinates("dev.ffmpegkit-maintained", "ffmpeg-kit-free-81", "8.1.3")

    signAllPublications()
    publishToMavenCentral(true)

    pom {
        name = "FFmpegKit 8.1 LTS (Free)"
        description = "FFmpegKit 8.1 LTS — Free tier (software-only: AV1/VP8/VP9/Opus/Vorbis/Speex). The paid tiers of this 8.1 line include Whisper.cpp v1.7.5 for on-device speech recognition: (1) automatic transcription in 99+ languages with SRT subtitle output, (2) auto-translation of any language to English — no API key, no internet, fully on-device. For H.264/H.265 encode, hardware MediaCodec, TLS, subtitles rendering, OCR, SRT streaming, or Whisper, see Basic-81/Full-81/Full-GPL-81 at the Project URL below."
        inceptionYear = "2026"
        // Points at the GitHub Release with the tier comparison table AND
        // direct Gumroad/Maven links together, not just the bare repo root
        // - Maven Central renders this as an actual clickable "Project URL"
        // link (unlike the plain-text description field above, which
        // Central Portal does NOT linkify even when it contains a URL).
        url = "https://github.com/ffmpegkit-maintained/ffmpeg-kit/releases"

        licenses {
            license {
                name = "GNU Lesser General Public License v3.0"
                url = "https://github.com/ffmpegkit-maintained/ffmpeg-kit/blob/main/LICENSE"
                distribution = "repo"
            }
        }

        developers {
            developer {
                id = "ffmpegkit-maintained"
                name = "ffmpegkit-maintained"
                url = "https://github.com/ffmpegkit-maintained"
            }
        }

        scm {
            url = "https://github.com/ffmpegkit-maintained/ffmpeg-kit"
            connection = "scm:git:git://github.com/ffmpegkit-maintained/ffmpeg-kit.git"
            developerConnection = "scm:git:ssh://git@github.com/ffmpegkit-maintained/ffmpeg-kit.git"
        }
    }
}

task javadoc(type: Javadoc) {
    title = 'FFmpegKit'
    destinationDir = file("${projectDir}/../../docs/android/javadoc")
    classpath += project.files(android.getBootClasspath().join(File.pathSeparator))
    source = android.sourceSets.main.java.srcDirs
    configurations.implementation.setCanBeResolved(true)
    classpath += configurations.implementation
}

dependencies {
    api 'com.arthenica:smart-exception-java:0.2.1'
    testImplementation "androidx.test.ext:junit:1.1.5"
    testImplementation 'org.json:json:20230618'
    androidTestImplementation "androidx.test.ext:junit:1.1.5"
    androidTestImplementation "androidx.test:runner:1.5.2"
}
